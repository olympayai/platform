  /v1/policy-assignments:
    get:
      operationId: listAllPolicyAssignments
      tags: [policies]
      summary: List all policy assignments
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyAssignmentListResponse"
    post:
      operationId: createPolicyAssignment
      tags: [policies]
      summary: Assign a policy to a target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyAssignmentBody"
      responses:
