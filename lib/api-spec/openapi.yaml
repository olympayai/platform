openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Credd AI - Financial infrastructure for autonomous AI agents
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: AI agent management
  - name: accounts
    description: Agent account management
  - name: cards
    description: Virtual card management
  - name: policies
    description: Spending policy management
  - name: transactions
    description: Transaction processing
  - name: approvals
    description: Approval workflow management
  - name: auditLogs
    description: Audit log access
  - name: monitoring
    description: System monitoring
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"

  /v1/agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"

  /v1/agents/{agentId}/accounts:
    get:
      operationId: listAgentAccounts
      tags: [accounts]
      summary: List accounts for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"

  /v1/agents/{agentId}/transactions:
    get:
      operationId: listAgentTransactions
      tags: [transactions]
      summary: List transactions for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /v1/agents/{agentId}/policies:
    get:
      operationId: listAgentPolicies
      tags: [policies]
      summary: List policies for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of policies
