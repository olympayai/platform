  /v1/cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: List all cards
      responses:
        "200":
          description: List of cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardListResponse"
    post:
      operationId: createCard
      tags: [cards]
      summary: Create a card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardBody"
      responses:
        "201":
          description: Created card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"

  /v1/cards/{id}:
    get:
      operationId: getCard
      tags: [cards]
      summary: Get card by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Card
          content:
            application/json:
              schema:
