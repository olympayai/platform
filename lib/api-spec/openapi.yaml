  /v1/policies:
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List all policies
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"
    post:
      operationId: createPolicy
      tags: [policies]
      summary: Create a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyBody"
      responses:
        "201":
          description: Created policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"

  /v1/policies/{id}:
    get:
      operationId: getPolicy
      tags: [policies]
      summary: Get policy by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"

  /v1/policies/{id}/status:
    patch:
      operationId: updatePolicyStatus
      tags: [policies]
      summary: Update policy status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusBody"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"

  /v1/policies/{id}/assignments:
    get:
      operationId: listPolicyAssignments
      tags: [policies]
      summary: List assignments for a policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
