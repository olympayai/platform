          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyAssignmentResponse"

  /v1/transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /v1/transactions/attempt:
    post:
      operationId: attemptTransaction
      tags: [transactions]
      summary: Attempt a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttemptTransactionBody"
      responses:
        "200":
          description: Transaction attempt result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionAttemptResponse"

  /v1/transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"

  /v1/transactions/{id}/approval:
    get:
      operationId: getTransactionApproval
      tags: [approvals]
      summary: Get approval for a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"

  /v1/approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      summary: List all approval requests
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"

  /v1/approvals/{id}:
    get:
      operationId: getApproval
      tags: [approvals]
      summary: Get approval by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"

  /v1/approvals/{id}/approve:
    post:
      operationId: approveRequest
      tags: [approvals]
      summary: Approve an approval request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveDeclineBody"
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"

  /v1/approvals/{id}/decline:
    post:
      operationId: declineRequest
      tags: [approvals]
      summary: Decline an approval request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveDeclineBody"
      responses:
        "200":
          description: Decline result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"

  /v1/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [auditLogs]
      summary: List audit logs
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: entityId
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /v1/audit-logs/{id}:
    get:
      operationId: getAuditLog
      tags: [auditLogs]
      summary: Get audit log by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"

  /v1/entities/{entityType}/{entityId}/audit-logs:
    get:
      operationId: listEntityAuditLogs
      tags: [auditLogs]
      summary: List audit logs for an entity
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /v1/monitoring/overview:
    get:
      operationId: getMonitoringOverview
      tags: [monitoring]
      summary: Get monitoring overview
      responses:
        "200":
          description: Monitoring overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringOverviewResponse"

  /v1/monitoring/transactions/summary:
    get:
      operationId: getTransactionsSummary
      tags: [monitoring]
      summary: Get transactions summary
      responses:
        "200":
          description: Transactions summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionSummaryResponse"

  /v1/monitoring/approvals/summary:
    get:
      operationId: getApprovalsSummary
      tags: [monitoring]
      summary: Get approvals summary
      responses:
        "200":
          description: Approvals summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalsSummaryResponse"

  /v1/monitoring/agents/activity:
    get:
      operationId: getAgentsActivity
      tags: [monitoring]
      summary: Get agents activity
      responses:
        "200":
          description: Agents activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsActivityResponse"

  /v1/monitoring/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [monitoring]
      summary: Get recent activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivityResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended, pending]
        description:
          type: string
          nullable: true
        externalRef:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt

    Account:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        name:
          type: string
        accountRef:
          type: string
          nullable: true
        currency:
          type: string
        status:
          type: string
          enum: [active, frozen, closed]
        balanceMinor:
          type: integer
        availableBalanceMinor:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - agentId
        - name
        - currency
        - status
        - balanceMinor
        - availableBalanceMinor
        - createdAt
        - updatedAt

    Card:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        accountId:
          type: string
        cardRef:
          type: string
          nullable: true
        last4:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        network:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, frozen, terminated]
        spendingEnabled:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - agentId
        - accountId
        - status
        - spendingEnabled
        - createdAt
        - updatedAt

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [SPEND_LIMIT, MERCHANT_ALLOWLIST, MERCHANT_BLOCKLIST, APPROVAL_REQUIRED, TIME_WINDOW]
        status:
          type: string
          enum: [active, disabled]
        configJson:
          type: object
        description:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - type
        - status
        - configJson
        - createdAt
        - updatedAt

    PolicyAssignment:
      type: object
      properties:
        id:
          type: string
        policyId:
          type: string
        targetType:
          type: string
          enum: [AGENT, ACCOUNT, CARD]
        targetId:
          type: string
        priority:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - policyId
        - targetType
        - targetId
        - priority
        - createdAt

    Transaction:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        accountId:
          type: string
        cardId:
          type: string
          nullable: true
        merchantId:
          type: string
          nullable: true
        direction:
          type: string
          enum: [DEBIT, CREDIT]
        amountMinor:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [attempted, pending, approved, declined, settled, reversed]
        decision:
          type: string
          enum: [ALLOW, DENY, REVIEW, NONE]
        approvalStatus:
          type: string
          enum: [NOT_REQUIRED, PENDING, APPROVED, DECLINED]
        declinedReason:
          type: string
          nullable: true
        requestedAt:
          type: string
        processedAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - agentId
        - accountId
        - direction
        - amountMinor
        - currency
        - status
        - decision
        - approvalStatus
        - requestedAt
        - createdAt
        - updatedAt

    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
        transactionId:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, DECLINED, EXPIRED]
        requestedByType:
          type: string
        requestedReason:
          type: string
          nullable: true
        reviewerId:
          type: string
          nullable: true
        reviewedAt:
          type: string
          nullable: true
        decisionReason:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - transactionId
        - status
        - requestedByType
        - createdAt
        - updatedAt

    AuditLog:
      type: object
      properties:
        id:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        action:
          type: string
        actorType:
          type: string
        actorId:
          type: string
          nullable: true
        traceId:
          type: string
          nullable: true
        payloadJson:
          type: object
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - entityType
        - entityId
        - action
        - actorType
        - createdAt

    MonitoringOverview:
      type: object
      properties:
        totalAgents:
          type: integer
        activeAgents:
          type: integer
        totalAccounts:
          type: integer
        activeAccounts:
          type: integer
        totalCards:
          type: integer
        activeCards:
          type: integer
        totalPolicies:
          type: integer
        activePolicies:
          type: integer
        totalTransactions:
          type: integer
        pendingApprovals:
          type: integer
      required:
        - totalAgents
        - activeAgents
        - totalAccounts
        - activeAccounts
        - totalCards
        - activeCards
        - totalPolicies
        - activePolicies
        - totalTransactions
        - pendingApprovals

    TransactionSummary:
      type: object
      properties:
        totalTransactions:
          type: integer
        approvedTransactions:
          type: integer
        declinedTransactions:
          type: integer
        pendingTransactions:
          type: integer
        reviewPendingTransactions:
          type: integer
      required:
        - totalTransactions
        - approvedTransactions
        - declinedTransactions
        - pendingTransactions
        - reviewPendingTransactions

    ApprovalsSummary:
      type: object
      properties:
        totalApprovalRequests:
          type: integer
        pendingApprovalRequests:
          type: integer
        approvedApprovalRequests:
          type: integer
        declinedApprovalRequests:
          type: integer
      required:
        - totalApprovalRequests
        - pendingApprovalRequests
        - approvedApprovalRequests
