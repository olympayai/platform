kind = "web"
previewPath = "/"
title = "Credd AI"
version = "1.0.0"
id = "artifacts/credd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23924
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/credd run dev"

[services.env]
PORT = "23924"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/credd", "run", "build"]
publicDir = "artifacts/credd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
